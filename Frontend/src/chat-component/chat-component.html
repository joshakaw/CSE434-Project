<h1>Before you arrive...</h1>
<p>
  Tell us your current condition and any relevant medical history. We'll create
  a preliminary triage report to allow you to be more quickly served upon your
  arrival.
</p>

<form>
  <mat-form-field style="width: 100%">
    <mat-label>Indicate your condition</mat-label>
    <textarea matInput rows="5" placeholder="Ex. I feel like..."></textarea>
  </mat-form-field>

  <button matButton="filled">
    <mat-icon>send</mat-icon>
    Submit
  </button>
</form>
